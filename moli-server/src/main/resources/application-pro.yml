# mysql数据库的配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/moli?useSSL=false&useUnicode=true&characterEncoding=utf-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Moli@123456
    druid:
      min-idle: 3
      max-active: 15
      initial-size: 5
      min-evictable-idle-time-millis: 30000
      max-evictable-idle-time-millis: 60000
      validation-query: SELECT 1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 彩色控制台日志级别
  output:
    ansi:
      enabled: always
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  # Redis数据源
  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 1
    timeout: 86400000
    jedis:
      pool:
        max-active: 1000  # 连接池最大连接数（使用负值表示没有限制）
        max-wait: -1      # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-idle: 10      # 连接池中的最大空闲连接
        min-idle: 5       # 连接池中的最小空闲连接

mybatis-plus:
  # 配置映射文件位置，classpath指resources
  mapper-locations: classpath*:mapper/*.xml # mapper.xml文件所在位置
  # 打印sql到控制台
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志相关配置
logging:
  # 指定自定义命名的配置文件
  config: classpath:logback-spring.xml

# pageHelper配置（官网推荐配置）
pagehelper:
  # 分页插件会自动检测当前的数据库链接，自动选择合适的分页方式
  helperDialect: mysql
  # 分页合理化参数，默认值为false。当该参数设置为 true 时，pageNum<=0 时会查询第一页，pageNum>pages（超过总数时），会查询最后一页。默认false 时，直接根据参数进行查询。
  reasonable: true
  # 支持通过 Mapper 接口参数来传递分页参数，默认值false，分页插件会从查询方法的参数值中，自动根据上面 params 配置的字段中取值，查找到合适的值时就会自动分页。
  supportMethodsArguments: true
  # 为了支持startPage(Object params)方法，增加了该参数来配置参数映射，用于从对象中根据属性名取值
  params: count=countSql

minio:
  url: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin

swagger:
  show: false
