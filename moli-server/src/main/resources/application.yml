### 配置端口号
server:
  port: 8888

### 选择环境
spring:
  application:
    name: moli-server
  profiles:
    active: dev

captcha:
  enabled: false

# true=同一用户新登录踢掉旧会话；false=多端并存（互不影响）
shiro:
  single-session: false

# 多系统门户与 SSO（系统级访问控制，菜单仍走全局 RBAC）
sso:
  enabled: true
  ticket-ttl-seconds: 60
  entry-path: /sso/login
  # 生产请用环境变量 SSO_SHARED_SECRET 覆盖
  shared-secret: ${SSO_SHARED_SECRET:}
